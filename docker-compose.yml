services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"      # exposto só para acesso local (Compass, etc.)
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/vcm
      FRONTEND_URL: http://localhost
      JWT_SECRET: change_me_in_production_use_a_long_random_string
      JWT_EXPIRES_IN: 7d
      NODE_ENV: development
      # RESEND_API_KEY: re_your_key_here  # descomente para habilitar e-mails
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
